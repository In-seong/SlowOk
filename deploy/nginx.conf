# SlowOK Nginx Configuration
# 도메인: slowokuser.revuplan.com, slowokadmin.revuplan.com

upstream php-fpm {
    server unix:/run/php/php8.2-fpm.sock;
}

# ── User 앱 (학습자/학부모 + 모바일 WebView) ──
server {
    listen 443 ssl http2;
    server_name slowokuser.revuplan.com;

    ssl_certificate     /etc/letsencrypt/live/revuplan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revuplan.com/privkey.pem;

    root /var/www/slowok/slowok_back/public;
    index index.php index.html;

    client_max_body_size 20M;

    # API 요청 → Laravel (PHP-FPM)
    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sanctum CSRF
    location ^~ /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 처리
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # User SPA 정적 파일 (JS, CSS, 이미지 등)
    location /assets {
        alias /var/www/slowok/slowok_back/public/user/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # User SPA (Vue Router WebHistory fallback)
    location / {
        root /var/www/slowok/slowok_back/public/user;
        try_files $uri $uri/ /index.html;
    }

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 숨김 파일 접근 차단
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/slowok-user-access.log;
    error_log  /var/log/nginx/slowok-user-error.log;
}

# ── Admin 앱 (관리자) ──
server {
    listen 443 ssl http2;
    server_name slowokadmin.revuplan.com;

    ssl_certificate     /etc/letsencrypt/live/revuplan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revuplan.com/privkey.pem;

    root /var/www/slowok/slowok_back/public;
    index index.php index.html;

    client_max_body_size 20M;

    # API 요청 → Laravel (PHP-FPM)
    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Admin SPA 정적 파일
    location /assets {
        alias /var/www/slowok/slowok_back/public/admin/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Admin SPA (HashHistory 사용이지만 안전하게 fallback 설정)
    location / {
        root /var/www/slowok/slowok_back/public/admin;
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/slowok-admin-access.log;
    error_log  /var/log/nginx/slowok-admin-error.log;
}

# ── HTTP → HTTPS 리다이렉트 ──
server {
    listen 80;
    server_name slowokuser.revuplan.com slowokadmin.revuplan.com;
    return 301 https://$host$request_uri;
}
